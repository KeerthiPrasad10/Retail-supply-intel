<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Supplier Onboarding · IFS Nexus Black Supply · LKA</title>
<style>
@font-face{font-family:'Suisse Intl';src:url('fonts/SuisseIntl-Regular.otf') format('opentype');font-weight:400;font-display:swap;}
@font-face{font-family:'Suisse Intl';src:url('fonts/SuisseIntl-Medium.otf') format('opentype');font-weight:500;font-display:swap;}
@font-face{font-family:'Suisse Intl';src:url('fonts/SuisseIntl-SemiBold.otf') format('opentype');font-weight:600;font-display:swap;}
@font-face{font-family:'PP Supply Mono';src:url('fonts/PPSupplyMono-Regular.ttf') format('truetype');font-weight:400;font-display:swap;}
@font-face{font-family:'PP Supply Mono';src:url('fonts/PPSupplyMono-Medium.ttf') format('truetype');font-weight:500;font-display:swap;}
:root{
--font:'Suisse Intl','Inter',system-ui,-apple-system,sans-serif;
--mono:'PP Supply Mono',ui-monospace,Menlo,Consolas,monospace;
--page:#f2f2f2;--s1:#fafafa;--s2:#f2f2f2;--s3:#e6e6e6;
--ink:#090909;--ink2:#222222;--muted:#6b6b6b;--faint:#afafaf;--inv:#fafafa;
--line:rgba(0,0,0,0.08);--line2:rgba(0,0,0,0.14);--line3:rgba(0,0,0,0.20);
--ov:rgba(0,0,0,0.03);--ov2:rgba(0,0,0,0.05);
--blue:#0365d8;--blue-bg:rgba(3,101,216,0.10);
--amber:#b86d05;--amber-bg:rgba(184,109,5,0.10);
--green:#187e43;--green-bg:rgba(24,126,67,0.10);
--red:#b73030;--red-bg:rgba(183,48,48,0.08);
--grey-bg:rgba(0,0,0,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--font);background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;letter-spacing:-0.1px;}
::selection{background:var(--ink);color:var(--page);}
.app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden;}
.sidebar{background:var(--s1);border-right:0.5px solid var(--line);display:flex;flex-direction:column;padding:16px 12px;gap:4px;overflow-y:auto;}
.brand{font-family:var(--mono);font-weight:500;font-size:16px;letter-spacing:-0.5px;padding:6px 10px 14px;}
.brand .sl{color:var(--muted);}
.vswitch{display:flex;flex-direction:column;gap:4px;background:var(--s3);border-radius:10px;padding:4px;margin-bottom:8px;}
.vswitch .vbtn{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0;background:none;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;text-align:left;}
.vswitch .vbtn .ic{width:16px;height:16px;flex:0 0 16px;opacity:.7;}
.vswitch .vbtn.on{background:var(--s1);color:var(--ink);box-shadow:0 1px 0 rgba(0,0,0,0.04);}
.vswitch .vbtn .who{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-left:auto;}
.navsec{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);padding:14px 10px 4px;}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--ink2);cursor:pointer;border:0;background:none;width:100%;text-align:left;font-family:var(--font);}
.navitem:hover{background:var(--ov2);}
.navitem.on{background:var(--s3);color:var(--ink);font-weight:500;}
.navitem .ic{width:16px;height:16px;flex:0 0 16px;opacity:.6;}
.navitem.on .ic{opacity:.9;}
.navitem .num{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--s3);border-radius:5px;padding:1px 6px;}
.sidefoot{margin-top:auto;padding:12px 10px 4px;border-top:0.5px solid var(--line);display:flex;align-items:center;gap:10px;}
.avatar{width:28px;height:28px;border-radius:9999px;background:var(--s3);display:grid;place-items:center;font-weight:500;font-size:11px;color:var(--ink2);}
.sidefoot .nm{font-size:12px;font-weight:500;}.sidefoot .rl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.main{display:flex;flex-direction:column;min-width:0;min-height:0;height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;border-bottom:0.5px solid var(--line);background:color-mix(in srgb,var(--page) 86%,transparent);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20;}
.crumbs{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center;}
.crumbs b{color:var(--ink);font-weight:500;}
.sysstat{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.04em;color:var(--green);display:inline-flex;align-items:center;gap:6px;}
.sysstat .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.content{flex:1;min-height:0;overflow-y:auto;padding:32px 28px 80px;}
.wrap{max-width:1080px;margin:0 auto;}
.wrap.narrow{max-width:760px;}
h1{font-size:28px;font-weight:500;letter-spacing:-0.6px;line-height:1.15;}
h2{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
.sub{font-size:14px;color:var(--ink2);margin-top:6px;max-width:64ch;}
.eyemono{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.row{display:flex;align-items:center;gap:12px;}
.spread{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.mt8{margin-top:8px;}.mt16{margin-top:16px;}.mt24{margin-top:24px;}.mt32{margin-top:32px;}
.btn{font-family:var(--font);font-weight:500;font-size:13px;border-radius:9999px;padding:9px 16px;cursor:pointer;border:0.5px solid transparent;line-height:1.2;display:inline-flex;align-items:center;gap:7px;letter-spacing:-0.1px;transition:120ms ease;}
.btn .ic{width:15px;height:15px;}
.btn.primary{background:var(--ink);color:var(--inv);}
.btn.primary:hover{opacity:.88;}
.btn.secondary{background:var(--ov2);color:var(--ink);}
.btn.secondary:hover{background:rgba(0,0,0,0.09);}
.btn.ghost{background:none;color:var(--ink2);border-color:var(--line2);}
.btn.ghost:hover{background:var(--ov2);}
.btn.approve{background:none;color:var(--green);border-color:var(--green);}
.btn.approve:hover{background:var(--green-bg);}
.btn.reject{background:none;color:var(--red);border-color:rgba(183,48,48,0.4);}
.btn.reject:hover{background:var(--red-bg);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.sm{padding:6px 12px;font-size:12px;}
.badge{font-family:var(--mono);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.04em;border-radius:9999px;padding:3px 9px;display:inline-flex;align-items:center;gap:6px;border:0.5px solid transparent;white-space:nowrap;}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge.review{background:var(--blue-bg);color:var(--blue);}
.badge.pending{background:var(--amber-bg);color:var(--amber);}
.badge.active{background:var(--green-bg);color:var(--green);}
.badge.draft{background:var(--grey-bg);color:var(--muted);}
.badge.rejected{background:var(--red-bg);color:var(--red);}
.card{background:var(--s1);border:0.5px solid var(--line);border-radius:16px;padding:18px 20px;}
.card+.card{margin-top:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}}
.stat{background:var(--s1);border:0.5px solid var(--line);border-radius:14px;padding:16px 18px;}
.stat .v{font-size:30px;font-weight:500;letter-spacing:-0.6px;line-height:1;}
.stat .k{font-size:12px;color:var(--muted);margin-top:8px;}
.stat .v.green{color:var(--green);}.stat .v.amber{color:var(--amber);}.stat .v.blue{color:var(--blue);}
.suprow{background:var(--s1);border:0.5px solid var(--line);border-radius:16px;padding:16px 20px;display:grid;grid-template-columns:1fr auto;gap:10px 16px;align-items:center;cursor:pointer;transition:120ms ease;}
.suprow+.suprow{margin-top:10px;}
.suprow:hover{background:var(--ov);border-color:var(--line2);}
.suprow.new{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg);}
.suprow .meta{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.suprow .nm{font-size:16px;font-weight:500;margin-top:3px;}
.suprow .tags{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.suprow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.vem{font-family:var(--mono);font-size:11px;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;}
.vem b{font-size:14px;}
.vemdot{width:9px;height:9px;border-radius:2px;display:inline-block;}
.filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:20px 0 4px;}
.pill{font-size:12px;padding:6px 13px;border-radius:9999px;background:var(--ov2);color:var(--ink2);cursor:pointer;border:0.5px solid transparent;font-family:var(--font);}
.pill.on{background:var(--ink);color:var(--inv);}
.pill .c{font-family:var(--mono);font-size:10px;opacity:.7;margin-left:5px;}
.filter .ct{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}
.lifecycle{display:flex;gap:0;border:0.5px solid var(--line2);border-radius:9px;overflow:hidden;width:fit-content;}
.lc{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.04em;padding:6px 14px;color:var(--muted);background:var(--s1);}
.lc+.lc{border-left:0.5px solid var(--line2);}
.lc.on{background:var(--ink);color:var(--inv);}
.lc.passed{background:var(--green-bg);color:var(--green);}
/* critical path strip */
/* critical path: read-only progress timeline (not buttons) */
.cpcap{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-top:12px;margin-bottom:9px;}
.cpath{display:flex;align-items:flex-start;gap:0;margin:0 2px;}
.cpstep{flex:1 1 0;display:flex;flex-direction:column;align-items:center;position:relative;}
.cpstep::before{content:"";position:absolute;top:10px;left:-50%;width:100%;height:2px;background:var(--line2);transform:translateY(-50%);z-index:0;}
.cpstep:first-child::before{display:none;}
.cpstep.done::before,.cpstep.now::before{background:var(--green);}
.cpstep .node{position:relative;z-index:1;width:20px;height:20px;border-radius:50%;background:var(--page);border:1.5px solid var(--line3);display:grid;place-items:center;font-family:var(--mono);font-size:9px;color:var(--muted);}
.cpstep.done .node{background:var(--green);border-color:var(--green);color:#fff;}
.cpstep.done .node .svgic{width:11px;height:11px;stroke:#fff;}
.cpstep.now .node{background:var(--ink);border-color:var(--ink);color:var(--inv);}
.cpstep .cplbl{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:0.02em;color:var(--faint);text-align:center;margin-top:7px;line-height:1.3;max-width:80px;}
.cpstep.done .cplbl{color:var(--muted);}
.cpstep.now .cplbl{color:var(--ink);font-weight:500;}
.cpadv{display:flex;justify-content:space-between;gap:8px;margin-top:12px;}
/* form */
.secblock{margin-top:10px;}
.sechead{display:flex;align-items:center;gap:10px;margin:22px 0 10px;scroll-margin-top:24px;}
.sechead .t{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink2);}
.sechead .ln{flex:1;height:0.5px;background:var(--line2);}
.sechead .who{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);background:var(--s3);border-radius:5px;padding:2px 7px;}
.field{margin-bottom:14px;}
.field label{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;font-family:var(--font);font-size:14px;color:var(--ink);background:var(--s1);border:0.5px solid var(--line2);border-radius:8px;padding:9px 12px;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ink);}
.field textarea{min-height:60px;resize:vertical;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
.fgrid.f3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:600px){.fgrid,.fgrid.f3{grid-template-columns:1fr;}}
.autochip{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.04em;border-radius:5px;padding:1px 6px;}
.autochip.hi{color:var(--green);background:var(--green-bg);}
.autochip.mid{color:var(--amber);background:var(--amber-bg);}
.autochip.lo{color:var(--red);background:var(--red-bg);}
.autochip.man{color:var(--muted);background:var(--grey-bg);}
.autochip.lka{color:var(--blue);background:var(--blue-bg);}
/* doc rows */
.doc{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--line);}
.doc:last-child{border-bottom:0;}
.doc .nm{font-size:13px;font-weight:500;flex:1;}
.doc .nm small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:1px;}
.check{display:flex;align-items:center;gap:8px;}
.checkbox{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:1.5px solid var(--line3);border-radius:6px;background:#fff;cursor:pointer;display:grid;place-items:center;flex:0 0 20px;}
.checkbox:checked{background:var(--green);border-color:var(--green);}
.checkbox:checked::after{content:"\2713";color:#fff;font-size:12px;font-weight:700;}
/* record view (buyer) */
.rec .sechead{margin:18px 0 8px;}
.kv2{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
@media(max-width:600px){.kv2{grid-template-columns:1fr;}}
.kvr{display:block;padding:8px 0;border-bottom:0.5px solid var(--line);min-width:0;}
.kvr .k{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
.kvr .vc{display:flex;flex-wrap:wrap;align-items:center;gap:8px;min-width:0;}
.kvr .v{font-size:13px;color:var(--ink);min-width:0;overflow-wrap:anywhere;}
.kvr .v.empty{color:var(--faint);}
.kvr .pv{flex:0 0 auto;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}
.tbl th{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--line2);font-weight:500;}
.tbl td{padding:6px 8px;border-bottom:0.5px solid var(--line);color:var(--ink2);}
.pa{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--line);font-size:12px;}
.pa:last-child{border-bottom:0;}
.pa .nm{flex:1;}
.pa .pct{font-family:var(--mono);font-size:11px;color:var(--ink2);}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,0.40);z-index:40;display:none;}
.scrim.on{display:block;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(680px,96vw);background:var(--page);z-index:50;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;border-left:0.5px solid var(--line2);}
.drawer.on{transform:none;}
.drawer .dhead{padding:18px 24px;border-bottom:0.5px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.drawer .dbody{padding:18px 24px 48px;overflow-y:auto;flex:1;}
.drawer .dx{width:32px;height:32px;border-radius:9999px;border:0;background:var(--ov2);cursor:pointer;font-size:16px;color:var(--ink);flex:0 0 32px;}
.dtabs{display:flex;gap:4px;padding:0 24px;border-bottom:0.5px solid var(--line);overflow-x:auto;}
.dtab{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.04em;padding:11px 10px;color:var(--muted);background:none;border:0;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.dtab.on{color:var(--ink);border-bottom-color:var(--ink);}
.approval{background:var(--s1);border:0.5px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.approval .t{font-size:13px;font-weight:500;}
.approval .t small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:2px;}
.gate{background:var(--amber-bg);border:0.5px solid rgba(184,109,5,0.25);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--amber);margin-top:10px;display:flex;gap:9px;align-items:flex-start;}
.gate.ok{background:var(--green-bg);border-color:rgba(24,126,67,0.25);color:var(--green);}
.banner{background:var(--blue-bg);border:0.5px solid rgba(3,101,216,0.25);border-radius:12px;padding:13px 16px;font-size:13px;color:var(--blue);display:flex;gap:10px;align-items:flex-start;margin-bottom:18px;}
.banner b{font-weight:600;}
.muted{color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--inv);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:60;opacity:0;transition:.3s;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.svgic{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.progress{height:5px;background:var(--s3);border-radius:9999px;overflow:hidden;margin-top:6px;}
.progress span{display:block;height:100%;background:var(--ink);transition:width .4s ease;}
/* guided two-pane */
.guided{display:grid;grid-template-columns:360px 1fr;gap:28px;align-items:start;}
@media(max-width:900px){.guided{grid-template-columns:1fr;}}
.lpane{position:sticky;top:8px;}
@media(max-width:900px){.lpane{position:static;}}
.dropzone{border:1.5px dashed var(--line3);border-radius:14px;padding:26px 18px;text-align:center;background:var(--s1);cursor:pointer;transition:120ms ease;}
.dropzone:hover{border-color:var(--line3);background:var(--ov2);}
.dropzone.over{border-color:var(--ink);background:var(--ov2);}
.dropzone .dzic{width:30px;height:30px;color:var(--muted);margin:0 auto 8px;}
.dropzone .big{font-size:14px;font-weight:500;}
.dropzone .sm{font-size:12px;color:var(--muted);margin-top:3px;}
.reclist{margin-top:8px;}
.recitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--line);cursor:pointer;}
.recitem:last-child{border-bottom:0;}
.recitem:hover{background:var(--ov);}
.recitem .ic{width:30px;height:30px;border-radius:8px;background:var(--s3);display:grid;place-items:center;flex:0 0 30px;color:var(--muted);}
.recitem.done{cursor:default;}
.recitem.done .ic{background:var(--green-bg);color:var(--green);}
.recitem .nm{flex:1;font-size:13px;font-weight:500;min-width:0;}
.recitem .nm small{display:block;font-weight:400;color:var(--muted);font-size:11px;}
.fieldrow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:0.5px solid var(--line);}
.fieldrow:last-child{border-bottom:0;}
.fieldrow .k{flex:0 0 168px;font-size:12px;color:var(--muted);padding-top:8px;}
@media(max-width:600px){.fieldrow{flex-direction:column;gap:4px;}.fieldrow .k{flex:none;padding-top:0;}}
.fieldrow .c{flex:1;min-width:0;}
.fieldrow .val{font-size:14px;font-weight:500;padding-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fieldrow.filled{border-radius:8px;}
.fieldrow.flash{animation:flashbg 1.1s ease;}
@keyframes flashbg{0%{background:var(--green-bg);}100%{background:transparent;}}
.recpill{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.03em;color:var(--blue);background:var(--blue-bg);border:0.5px solid rgba(3,101,216,0.22);border-radius:9999px;padding:5px 11px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;margin-top:3px;}
.recpill:hover{background:rgba(3,101,216,0.16);}
.recpill .svgic{width:12px;height:12px;}
.lkahint{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.03em;color:var(--muted);background:var(--grey-bg);border-radius:9999px;padding:5px 11px;display:inline-flex;margin-top:3px;}
.reasonhint{font-size:12px;color:var(--muted);background:var(--ov2);border:0.5px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:12px;line-height:1.45;}
.rsntag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.03em;color:var(--amber);background:var(--amber-bg);border-radius:5px;padding:1px 6px;}
.reqcard{border:0.5px solid var(--line2);}
.reqrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--line);}
.reqrow:last-child{border-bottom:0;}
.reqrow .nm{flex:1;font-size:13px;font-weight:500;}
.tick{width:20px;height:20px;border-radius:9999px;border:1.5px solid var(--line3);display:grid;place-items:center;flex:0 0 20px;color:#fff;background:#fff;}
.tick.on{background:var(--green);border-color:var(--green);}
.tick .svgic{width:12px;height:12px;}
.reqmark{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.03em;color:var(--red);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip2{font-size:12px;padding:6px 12px;border-radius:9999px;background:var(--ov2);color:var(--ink2);border:0.5px solid var(--line2);cursor:pointer;font-family:var(--font);}
.chip2.on{background:var(--ink);color:var(--inv);border-color:var(--ink);}
.tag{font-size:12px;padding:4px 6px 4px 11px;border-radius:9999px;background:var(--s3);display:inline-flex;align-items:center;gap:6px;}
.tag button{border:0;background:none;cursor:pointer;color:var(--muted);font-size:15px;line-height:1;padding:0;}
.catadd{margin-top:8px;font-family:var(--font);font-size:13px;background:var(--s1);border:0.5px solid var(--line2);border-radius:8px;padding:8px 11px;width:100%;}
.prow{display:grid;grid-template-columns:1.5fr 1fr 0.9fr 0.8fr 24px;gap:6px;margin-bottom:6px;align-items:center;}
.prow input{font-family:var(--font);font-size:13px;background:var(--s1);border:0.5px solid var(--line2);border-radius:7px;padding:7px 9px;width:100%;}
.prm{border:0;background:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;}
.condnote{font-size:12px;color:var(--amber);background:var(--amber-bg);border:0.5px solid rgba(184,109,5,0.22);border-radius:8px;padding:8px 11px;margin-top:10px;display:flex;gap:8px;align-items:flex-start;}
@media(max-width:600px){.prow{grid-template-columns:1fr 1fr;}}
.chk{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--line);}
.chk:last-child{border-bottom:0;}
.chk .nm{flex:1;font-size:13px;font-weight:500;}
.chk .nm small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:1px;}
.clar{border:0.5px solid var(--line2);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.clar .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.clar .ty{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.04em;color:var(--blue);background:var(--blue-bg);border-radius:5px;padding:2px 7px;}
.clar .msg{font-size:13px;line-height:1.45;}
.clar .resp{font-size:13px;background:var(--ov2);border-radius:8px;padding:8px 10px;margin-top:8px;}

.clarform select{font-family:var(--font);font-size:13px;background:var(--s1);border:0.5px solid var(--line2);border-radius:8px;padding:8px 10px;}
.precond{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;}
.precond .ic{width:15px;height:15px;flex:0 0 15px;}

.actneed .h{font-size:13px;font-weight:600;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:8px;}

function detectDoc(name){name=(name||'').toLowerCase();
  if(/licen|business.?lic|\bbrc\b/.test(name))return 'license';
  if(/bank|account|swift|iban/.test(name))return 'bank';
  if(/amfori|bsci|social|sa8000/.test(name))return 'social';
  if(/iso|14001|environ/.test(name))return 'env';
  if(/fire|safety|building/.test(name))return 'fire';
  if(/factory.?reg|reg.*factory|factory.?form|factory.?profile|\bmill\b/.test(name))return 'factory';
  if(/trial.?quot|\bquotation\b/.test(name))return 'trial';
  if(/en\s?71|toy.?saf/.test(name))return 'en71';
  if(/cpsia|age.?grad/.test(name))return 'cpsia';

// open reasoning over an unclassified file: infer which schema fields appear, lower confidence, always review
function reasonFile(name,quiet){
  const low=(name||'').toLowerCase();let keys;
  if(/capacity|line|production|factory|mill|plant/.test(low))keys=['facName','facAddr','monthlyCapacity','annualCapacity','freeCapacity','utilisation','prodLines','workers','leadTime','moq','facPort'];
  else if(/price|quot|cost|fob|sheet|xls|product|catalog/.test(low))keys=['annualVolume','keyCustomers','trialIan','trialFob','currency'];
  else if(/audit|compliance|cert|social/.test(low))keys=['bsciRating','bsciExp','isoNo','isoExp','fireNo','fireExp','facAddr'];
  else if(/profile|company|overview|about|intro/.test(low))keys=['name','addr','city','province','website','turnover','turnEU','turnUS','keyCustomers','contactName'];
  else keys=['name','contactName','contactEmail','contactPhone','turnover','annualVolume','monthlyCapacity','payTerm']; // generic internal note
  const filled=[];
  keys.forEach(k=>{const f=FBYK[k];if(!f)return;
    if(cur.D[k]==null||cur.D[k]===''){
      cur.D[k]=f.fill==='doc'?f.val:(REASONVAL[k]!=null?REASONVAL[k]:'(reasoned)');
      const base=f.fill==='doc'?(f.conf||0.8):0.72;
      cur.meta[k]={conf:Math.max(0.55,+(base-0.18).toFixed(2)),srcNm:name,doc:'reasoned',reasoned:true,status:'review'};
      filled.push(k);
    }});
  // a product catalogue or price sheet also yields product rows
  if(/product|catalog|price|sheet|range/.test(low)&&(!cur.products||!cur.products.length)){
    cur.products=[{name:'Cotton tee 180g',cat:'Knitwear',vol:'1,200,000',fob:'1.85'},{name:'Polo piqué',cat:'Knitwear',vol:'600,000',fob:'2.40'}];
    filled.push('products');
  }
  cur.reasonedDocs=cur.reasonedDocs||[];
  if(filled.length){cur._just=filled.filter(k=>k!=='products');cur.reasonedDocs.push({name,keys:filled});if(!quiet)toast('Reasoned over '+name+': '+filled.length+' item'+(filled.length>1?'s':'')+' filled');return filled.length;}
  if(!quiet)toast('Nothing new found in '+name);return 0;
}

let LIVE_EXTRACT=false;

function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result));r.onerror=rej;r.readAsDataURL(file);});}
async function callExtract(file,docType){
  if(file.size>4*1024*1024)return {err:'File is '+(file.size/1048576).toFixed(1)+'MB — over the ~4MB upload limit. Use a smaller scan/photo.'};
  let url;try{url=await fileToB64(file);}catch(e){return {err:'Could not read the file'};}
  const comma=url.indexOf(',');if(comma<0)return {err:'Could not read the file'};
  const mediaType=url.slice(5,comma).split(';')[0]||file.type||'';
  let resp;
  try{resp=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({filename:file.name,mediaType,dataBase64:url.slice(comma+1),docType:docType||undefined})});}
  catch(e){return {err:'Network error calling /api/extract'};}
  let j=null;try{j=await resp.json();}catch(e){}
  if(!resp.ok){console.warn('extract failed',resp.status,j);return {err:(j&&j.error)||('HTTP '+resp.status),status:resp.status};}
  if(j&&j.ok&&Array.isArray(j.fields))return {fields:j.fields,docType:j.docType,products:Array.isArray(j.products)?j.products:[]};
  return {err:'Unexpected response from /api/extract',status:resp.status};
}
// merge extracted product rows into the form's repeater; the form expands to fit. dedupes by name.
function mergeProducts(rows){
  if(!Array.isArray(rows)||!rows.length)return 0;
  cur.products=cur.products||[];
  const have=new Set(cur.products.map(p=>String(p.name||'').toLowerCase().trim()).filter(Boolean));
  let n=0;
  rows.forEach(r=>{const name=String(r.name||'').trim();if(!name||have.has(name.toLowerCase()))return;
    cur.products.push({name,cat:String(r.cat||''),vol:String(r.vol||''),fob:String(r.fob||'')});have.add(name.toLowerCase());n++;});
  return n;
}
function applyExtracted(fields,docKey,srcNm){
  const docNm=(DOCS.find(d=>d.key===docKey)||{}).nm||srcNm||'document';let n=0;const just=[];
  fields.forEach(fd=>{const k=fd.fieldKey,f=FBYK[k];if(!f)return;
    if(cur.D[k]==null||cur.D[k]==='')cur.D[k]=fd.value;
    cur.meta[k]={conf:(typeof fd.confidence==='number'?fd.confidence:0.85),srcNm:docNm,doc:docKey,status:'review',lang:fd.lang,translated:fd.translated};
    just.push(k);n++;});
  cur._just=just;return n;
}
// real upload of a recognised document type → live extract, else sample. Returns a queue result; never toasts (the queue narrates).
async function extractDoc(key,file){
  const res=await callExtract(file,key);
  const docNm=(DOCS.find(d=>d.key===key)||{}).nm||'document';
  if(res.fields&&res.fields.length)return {label:docNm,n:applyExtracted(res.fields,key,file.name),prods:mergeProducts(res.products),mode:'live'};
  if(res.fields)return {label:docNm,n:runExtract(key,true),mode:'sample',note:'no fields detected'};
  return {label:docNm,n:runExtract(key,true),mode:'sample',err:res.err||'unknown'}; // fallback keeps the demo alive
}
// real upload of an unclassified file → open reasoning. Returns {ok,n} | {err} | null (null ⇒ caller falls back to mock reasoning).
async function extractUnknown(file){
  if(!LIVE_EXTRACT)return null;
  const res=await callExtract(file,'');
  if(res.err)return {err:res.err};
  if(!res.fields||!res.fields.length)return null;
  const just=[];res.fields.forEach(fd=>{const k=fd.fieldKey,f=FBYK[k];if(!f)return;
    if(cur.D[k]==null||cur.D[k]===''){cur.D[k]=fd.value;
      cur.meta[k]={conf:Math.min(typeof fd.confidence==='number'?fd.confidence:0.6,0.78),srcNm:file.name,doc:'reasoned',reasoned:true,status:'review'};just.push(k);}});
  const prods=mergeProducts(res.products);
  if(!just.length&&!prods)return null;
  cur._just=just;cur.reasonedDocs=cur.reasonedDocs||[];cur.reasonedDocs.push({name:file.name,keys:just});
  return {ok:true,n:just.length,prods,reasoned:true};
}

function uqStat(s){

  if(s==='parsing')return '<span class="badge review"><span class="dot"></span>Parsing…</span>';

async function handleFiles(files){
  if(!files||!files.length)return;
  if(cur._uqTimer){clearTimeout(cur._uqTimer);cur._uqTimer=null;}
  const list=Array.from(files);
  cur._uploadQueue=list.map(f=>({name:f.name,status:'pending',msg:'Queued'}));
  render(); // paint the queue before the first (blocking) parse
  let acted=0,filled=0;
  for(let i=0;i<list.length;i++){
    const f=list[i],q=cur._uploadQueue[i];
    q.status='parsing';q.msg='Parsing…';renderQueue();
    const key=detectDoc(f.name);
    if(key){
      if(cur.docs[key]){q.status='skip';q.msg=((DOCS.find(d=>d.key===key)||{}).nm||'Document')+' already added';}
      else{cur.docs[key]=f.name;const r=await extractDoc(key,f);acted++;filled+=r.n||0;
        if(r.err){q.status='sample';q.msg=LIVE_EXTRACT?('Live parse failed: '+r.err+' · sample data'):('Demo mode · '+r.label+' · '+r.n+' field'+(r.n!==1?'s':''));}
        else if(r.mode==='sample'){q.status='sample';q.msg=(r.note||'sample')+' · '+r.n+' field'+(r.n!==1?'s':'');}
        else{q.status='done';q.msg=r.label+' · '+r.n+' field'+(r.n!==1?'s':'')+' read'+(r.prods?(' · '+r.prods+' product'+(r.prods!==1?'s':'')):'');}}
    }else{
      const r=await extractUnknown(f);
      if(r&&r.err){q.status='fail';q.msg='Live parse failed: '+r.err;}
      else if(r&&r.ok){acted++;filled+=r.n||0;q.status='done';q.msg='Reasoned · '+r.n+' field'+(r.n!==1?'s':'')+' filled'+(r.prods?(' · '+r.prods+' product'+(r.prods!==1?'s':'')):'');}
      else{const n=reasonFile(f.name,true);acted++;filled+=n;
        if(n){q.status='done';q.msg='Reasoned · '+n+' field'+(n!==1?'s':'')+' filled';}
        else{q.status='skip';q.msg='Nothing new found';}}
    }
    renderQueue();
  }
  render(); // fold every parsed value into the record
  toast(acted?('Parsed '+acted+' document'+(acted!==1?'s':'')+' · '+filled+' field'+(filled!==1?'s':'')+' filled'):'Those documents are already read');
  cur._uqTimer=setTimeout(()=>{cur._uploadQueue=null;cur._uqTimer=null;render();},3000);
}
function runExtract(key,quiet){
  const fields=DOC_FIELDS(key);const docNm=(DOCS.find(d=>d.key===key)||{}).nm||'document';
  if(!fields.length){if(!quiet)toast('Document read');return 0;}
  let n=0;const just=[];fields.forEach(f=>{if(cur.D[f.k]==null||cur.D[f.k]===''){cur.D[f.k]=f.val;}cur.meta[f.k]={conf:f.conf,srcNm:docNm,doc:key,status:'review'};just.push(f.k);n++;});
  cur._just=just;
  if(!quiet)toast(n+' field'+(n>1?'s':'')+' read from '+docNm);
  return n;
}

  viewEl.querySelectorAll('.suprow').forEach(r=>r.addEventListener('click',()=>{dtab='profile';openDrawer(r.dataset.id);}));
  viewEl.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{filter=p.dataset.f;render();}));
  $('#addmanual').addEventListener('click',()=>toast('Manual add is stubbed in this prototype'));
}
function lifecycle(stage){const st=['explore','onboard','manage'];const i=st.indexOf(stage);
  return '<div class="lifecycle">'+st.map((s,j)=>'<span class="lc '+(j===i?'on':j<i?'passed':'')+'">'+s+'</span>').join('')+'</div>';}
function supRow(s){const cat=VEMCAT(s.vem);const dn=DOCS.filter(d=>s.docs[d.key]).length;
  return '<div class="suprow'+(s.isNew?' new':'')+'" data-id="'+s.id+'">'
   +'<div><div class="meta">'+(s.isNew?'<span class="badge review" style="padding:1px 7px"><span class="dot"></span>New</span> ':'')+s.id+' &middot; '+s.country+' &middot; '+s.cat+'</div>'
   +'<div class="nm">'+s.nm+'</div>'
   +'<div class="tags"><span class="badge '+s.status+'"><span class="dot"></span>'+STATUS[s.status]+'</span>'+lifecycle(s.stage)+'</div></div>'
   +'<div class="rt"><span class="vem"><span class="vemdot" style="background:'+cat.c+'"></span>VEM <b>'+(s.vem||'–')+'</b> '+cat.t+'</span>'
   +'<span class="meta">'+dn+'/'+DOCS.length+' docs</span></div></div>';
}

// ---- record field row with provenance ----
function provChip(s,f){
  const m=s.meta&&s.meta[f.k];
  if(m)return '<span class="autochip '+confClass(m.conf)+'">'+confTxt(m.conf)+'</span>'+(m.reasoned?' <span class="rsntag">reasoned</span>':'');
  if(f.fill==='lka')return '<span class="autochip lka">LKA</span>';
  if(f.fill==='doc')return s.D[f.k]?'<span class="autochip man">document</span>':'';
  return s.D[f.k]?'<span class="autochip man">supplier</span>':'';
}
function recRow(s,f){const v=s.D[f.k];
  return '<div class="kvr"><div class="k">'+f.label+'</div><div class="vc"><span class="v'+(v?'':' empty')+'">'+(v?esc(v):'Not provided')+'</span><span class="pv">'+provChip(s,f)+'</span></div></div>';
}
function recordView(s){
  // group sections into the full CBX-like record
  return SCHEMA.map(sec=>{
    const head='<div class="sechead"><span class="t">'+sec.sec+'</span><span class="ln"></span><span class="who">'+sec.who+'</span></div>';
    if(sec.custom==='products'){return head+recProductsBlock(s)+'<div class="kv2">'+sec.fields.map(f=>recRow(s,f)).join('')+'</div>';}
    const rows=sec.fields.map(f=>recRow(s,f)).join('');
    let extra='';
    if(sec.sec==='Compliance & certificates'){extra=paBlock(s);}
    return head+'<div class="kv2">'+rows+'</div>'+extra;
  }).join('');
}
function paBlock(s){
  if(!s.docs.social)return '';
  // demo PA ratings (would come from amfori report)
  const vals=[88,72,90,100,80,76,94,100,100,84,100,79,86];
  return '<div class="card" style="margin-top:8px;padding:12px 16px"><div class="eyemono" style="margin-bottom:6px">amfori BSCI · section ratings (13)</div>'
    +PA.map((p,i)=>'<div class="pa"><span class="nm">'+p+'</span><span class="pct">'+vals[i]+'%</span></div>').join('')+'</div>';
}
function extractReview(s){
  const ents=Object.entries(s.meta||{});
  if(!ents.length)return '<p class="muted" style="font-size:13px">No document-extracted fields. Data was entered directly.</p>'
    +(s.verifiedOn?'<div class="gate ok"><svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Reviewed and verified on '+s.verifiedOn+'.</div>'
      :'<button class="btn approve sm" style="margin-top:10px" data-verify="1"><svg class="svgic" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Mark record reviewed</button>');
  const low=ents.filter(([,m])=>m.conf<0.8).length;
  const rows=ents.map(([k,m])=>{const f=FBYK[k];return '<div class="kvr"><div class="k">'+f.label+'</div><div class="vc"><span class="v">'+esc(s.D[k])+'<br><span class="muted" style="font-size:11px">'+(m.reasoned?'reasoned from ':'from ')+esc(m.srcNm||'document')+(m.reasoned?' · review carefully':'')+'</span></span><span class="pv"><span class="autochip '+confClass(m.conf)+'">'+confTxt(m.conf)+'</span></span></div></div>';}).join('');
  let gate;
  if(s.verifiedOn){gate='<div class="gate ok"><svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Verified by LKA on '+s.verifiedOn+'. Written to Supplier Master.</div>';}
  else{gate='<div class="gate"><svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>Advisory until confirmed. '+(low?low+' field(s) below 80% need a closer look. ':'')+'Verified On is empty.</div>';}
  return '<div class="card" style="padding:6px 16px 14px">'+rows+'</div>'+gate
    +(s.verifiedOn?'':'<button class="btn approve sm" style="margin-top:10px" data-verify="1"><svg class="svgic" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Confirm &amp; set Verified On</button>');
}
function reqForRec(s){return REQDOCS.concat((s.ptypes||[]).flatMap(t=>COND_DOCS[t]||[]));}
function checksClear(s){return CHECKS.every(c=>(s.checks[c.key]||'pending')==='clear');}
function openClarCount(s){return (s.clarifications||[]).filter(c=>c.status==='open').length;}
function isReady(s){return reqForRec(s).every(d=>s.docs[d.key])&&!!s.verifiedOn&&checksClear(s)&&!!s.vem&&s.vem!==6&&openClarCount(s)===0;}
const I_WARN='<svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
const I_OK='<svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>';
function checksBlock(s){
  const rows=CHECKS.map(c=>{const v=s.checks[c.key]||'pending';const st=cstat(v);
    const acts=(v==='flag'||v==='pending'||v==='review')?'<button class="btn ghost sm" data-chkclear="'+c.key+'">Mark clear</button><button class="btn ghost sm" data-chkclar="'+c.key+'">Ask supplier</button>':'';
    return '<div class="chk"><div class="nm">'+c.nm+'<small>'+c.sub+'</small></div><div class="row" style="gap:6px;flex-wrap:wrap;justify-content:flex-end"><span class="badge '+st[0]+'"><span class="dot"></span>'+st[1]+'</span>'+acts+'</div></div>';}).join('');
  const flagged=CHECKS.filter(c=>s.checks[c.key]==='flag').length;
  const pend=CHECKS.filter(c=>{const v=s.checks[c.key]||'pending';return v==='pending'||v==='review';}).length;
  let note=flagged?'<div class="gate">'+I_WARN+flagged+' check(s) flagged. Clear directly, or raise a clarification, before approval.</div>'
    :(pend?'<div class="gate">'+I_WARN+pend+' check(s) still running.</div>':'<div class="gate ok">'+I_OK+'All external checks clear.</div>');
  return '<div class="sechead" style="margin-top:0"><span class="t">External data verification</span><span class="ln"></span><button class="btn ghost sm" id="rerunchk">Re-run all</button></div>'
    +'<div class="card" style="padding:4px 16px">'+rows+'</div>'+note;
}
function clarifyBlock(s){
  const list=(s.clarifications||[]).map(c=>'<div class="clar"><div class="top"><span class="ty">'+c.type+'</span>'+(c.field?'<span class="muted" style="font-size:11px">re: '+esc(c.field)+'</span>':'')+'<span class="badge '+(c.status==='open'?'pending':c.status==='answered'?'review':'active')+'" style="margin-left:auto"><span class="dot"></span>'+(c.status==='open'?'Awaiting supplier':c.status==='answered'?'Answered':'Resolved')+'</span></div><div class="msg">'+esc(c.msg)+'</div>'
    +(c.response?'<div class="resp"><span class="who">supplier response</span>'+esc(c.response)+'</div>':'')
    +(c.status==='answered'?'<button class="btn approve sm" style="margin-top:8px" data-clarresolve="'+c.id+'">Mark resolved</button>':'')+'</div>').join('');
  const form='<div class="clarform card" style="padding:14px 16px"><div class="eyemono" style="margin-bottom:8px">Raise a clarification</div>'
    +'<div class="row" style="gap:8px;margin-bottom:8px"><select id="clartype"><option>Question</option><option>Document request</option><option>Data correction</option></select>'
    +'<input id="clarfield" placeholder="related field (optional)" style="flex:1;font-family:var(--font);font-size:13px;background:var(--s1);border:0.5px solid var(--line2);border-radius:8px;padding:8px 10px"></div>'
    +'<textarea id="clarmsg" placeholder="Message to the supplier"></textarea>'
    +'<button class="btn primary sm" id="clarsend" style="margin-top:8px">Send to supplier</button></div>';
  return '<div class="sechead" style="margin-top:0"><span class="t">Clarifications with supplier</span><span class="ln"></span></div>'+(list||'<p class="muted" style="font-size:13px">No clarifications raised yet.</p>')+'<div style="margin-top:12px">'+form+'</div>';
}
function approvalsBlock(s){
  const cat=VEMCAT(s.vem);
  const pc=[
    {ok:reqForRec(s).every(d=>s.docs[d.key]),label:'Required documents received'},
    {ok:!!s.verifiedOn,label:'Document data verified'},
    {ok:checksClear(s),label:'External checks clear'},
    {ok:!!s.vem&&s.vem!==6,label:'VEM scored and eligible'},
    {ok:openClarCount(s)===0,label:'No open clarifications'}
  ];
  const ready=pc.every(p=>p.ok);
  const pcList='<div class="sechead" style="margin-top:0"><span class="t">Ready to approve?</span><span class="ln"></span></div>'
    +'<div class="card" style="padding:10px 16px">'+pc.map(p=>'<div class="precond '+(p.ok?'ok':'no')+'">'+(p.ok?I_OK:'<svg class="svgic ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>')+p.label+'</div>').join('')+'</div>';
  let gates='';
  if(s.status==='rejected'){gates='<div class="gate"><svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>Rejected: VEM 6 (Insufficient). Not eligible for onboarding.</div>';}
  else if(s.status==='active'){gates='<div class="gate ok"><svg class="svgic" style="width:16px;height:16px;flex:0 0 16px" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Fully approved &middot; active supplier. Now in Manage.</div>';}
  else{gates='<div class="approval"><div class="t">GM approval<small>General Manager sign-off</small></div>'
      +(s.gm?'<span class="badge active"><span class="dot"></span>Approved</span>':'<button class="btn approve sm" data-approve="gm"'+(ready?'':' disabled')+'>Approve as GM</button>')+'</div>'
      +'<div class="approval"><div class="t">COO / HQ approval<small>Final gate before activation</small></div>'
      +(s.coo?'<span class="badge active"><span class="dot"></span>Approved</span>':'<button class="btn approve sm" data-approve="coo"'+(s.gm&&ready?'':' disabled')+'>Approve as COO</button>')+'</div>'
      +(!s.gm&&!ready?'<div class="gate">'+I_WARN+'Complete the checklist above before GM approval.</div>':(!s.gm?'<div class="gate">'+I_WARN+'COO approval unlocks after GM signs off (sequential gate).</div>':''));
  }
  return pcList
    +'<div class="sechead"><span class="t">VEM · Vendor Evaluation Matrix</span><span class="ln"></span></div>'
    +'<div class="card" style="padding:14px 16px"><div class="spread"><div><div style="font-size:13px;color:var(--muted)">Score 1 (Very Good) to 6 (Insufficient)</div>'
    +'<div class="row" style="gap:8px;margin-top:6px"><span class="vemdot" style="width:12px;height:12px;background:'+cat.c+'"></span><b style="font-size:20px">'+(s.vem||'–')+'</b><span style="color:'+cat.c+';font-weight:500">'+cat.t+'</span></div></div>'
    +'<div class="field" style="margin:0;width:150px"><label>set score</label><select id="vemset"><option value="">Not scored</option>'+[1,2,3,4,5,6].map(n=>'<option value="'+n+'"'+(s.vem===n?' selected':'')+'>'+n+'</option>').join('')+'</select></div></div></div>'
    +'<div class="sechead"><span class="t">Approval gates</span><span class="ln"></span></div>'+gates;
}
function cpathStrip(s,ctrl){
  const cp=(s.cp!=null)?s.cp:(STAGE_CP[s.stage]||0);
  const steps=CPATH.map((c,i)=>{
    const cls=i<cp?'done':i===cp?'now':'';
    const inner=i<cp?'<svg class="svgic" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>':(i+1);
    return '<div class="cpstep '+cls+'" title="'+c+'"><div class="node">'+inner+'</div><div class="cplbl">'+CPSHORT[i]+'</div></div>';
  }).join('');
  let adv='';
  if(ctrl){
    const atEnd=cp>=CPATH.length-1, atStart=cp<=0;
    const finalStep=cp===CPATH.length-2; // advancing into Manage Active
    const blocked=finalStep&&!isReady(s);
    const advLbl=atEnd?'Completed':('Advance: '+CPSHORT[cp+1]);
    adv='<div class="cpadv"><button class="btn ghost sm" data-cpback'+(atStart?' disabled':'')+'>&larr; Back</button>'
      +'<button class="btn '+(finalStep?'approve':'secondary')+' sm" data-cpadv'+((atEnd||blocked)?' disabled':'')+'>'+advLbl+' &rarr;</button></div>'
      +(blocked?'<div class="gate" style="margin-top:8px">'+I_WARN+'Final activation needs the Qualification checklist complete.</div>':'');
  }
  return '<div class="cpcap"><span class="eyemono">Onboarding critical path</span><span class="eyemono">step '+(Math.min(cp,CPATH.length-1)+1)+' of '+CPATH.length+'</span></div><div class="cpath">'+steps+'</div>'+adv;
}

// ============ DRAWER ============
function openDrawer(id){openId=id;const s=SUP.find(x=>x.id===id);if(!s)return;
  SUP.forEach(x=>x.isNew=false);
  const oc=openClarCount(s);
  const tabs=[['profile','Full record'],['data','Document data'],['checks','Verification'],['clarify','Clarifications'+(oc?' ('+oc+')':'')],['approval','Qualification']];
  let body;
  if(dtab==='data')body=extractReview(s);
  else if(dtab==='checks')body=checksBlock(s);
  else if(dtab==='clarify')body=clarifyBlock(s);
  else if(dtab==='approval')body=approvalsBlock(s);
  else body='<div class="rec">'+recordView(s)+'</div>';
  $('#drawer').innerHTML='<div class="dhead"><div><div class="eyemono">'+s.id+' &middot; '+s.country+'</div><h2 style="margin-top:4px">'+s.nm+'</h2>'
    +'<div class="tags" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><span class="badge '+s.status+'"><span class="dot"></span>'+STATUS[s.status]+'</span>'+lifecycle(s.stage)+'</div>'
    +cpathStrip(s,true)+'</div>'
    +'<button class="dx" id="dxc">&times;</button></div>'
    +'<div class="dtabs">'+tabs.map(t=>'<button class="dtab'+(dtab===t[0]?' on':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>').join('')+'</div>'
    +'<div class="dbody">'+body+'</div>';
  $('#dxc').addEventListener('click',closeDrawer);
  $('#drawer').querySelectorAll('.dtab').forEach(t=>t.addEventListener('click',()=>{dtab=t.dataset.tab;openDrawer(id);}));
  const vs=$('#vemset');if(vs)vs.addEventListener('change',e=>{s.vem=e.target.value?+e.target.value:null;if(s.vem===6){s.status='rejected';s.stage='explore';}else if(s.status==='rejected'){s.status='pending';}openDrawer(id);render();});
  const vfy=$('#drawer [data-verify]');if(vfy)vfy.addEventListener('click',()=>{s.verifiedOn=todayStr();s.D.licStatus='Verified';s.D.licVerified=s.verifiedOn;toast('Extracted data verified, written to master');openDrawer(id);render();});
  $('#drawer').querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click',()=>{
    const role=b.dataset.approve;
    if(role==='gm'){s.gm=true;s.cp=Math.max(s.cp||0,7);reconcileCp(s);s.status='pending';toast('GM approval recorded');}
    if(role==='coo'&&s.gm){s.coo=true;s.cp=8;reconcileCp(s);toast(s.nm+' activated, now in Manage');}
    openDrawer(id);render();
  }));
  // critical-path progression (demo): step forward/back through the 9 stages
  const cpa=$('#drawer [data-cpadv]');if(cpa)cpa.addEventListener('click',()=>{s.cp=Math.min(CPATH.length-1,(s.cp||0)+1);reconcileCp(s);toast('Advanced to '+CPATH[s.cp]);openDrawer(id);render();});
  const cpb=$('#drawer [data-cpback]');if(cpb)cpb.addEventListener('click',()=>{s.cp=Math.max(0,(s.cp||0)-1);reconcileCp(s);toast('Moved back to '+CPATH[s.cp]);openDrawer(id);render();});
  // verification: re-run, mark clear, raise clarification from a flagged check
  const rr=$('#rerunchk');if(rr)rr.addEventListener('click',()=>{CHECKS.forEach(c=>{if((s.checks[c.key]||'pending')!=='clear'&&s.checks[c.key]!=='flag')s.checks[c.key]='clear';});toast('Checks re-run');openDrawer(id);});
  $('#drawer').querySelectorAll('[data-chkclear]').forEach(b=>b.addEventListener('click',()=>{s.checks[b.dataset.chkclear]='clear';toast('Check marked clear');openDrawer(id);render();}));
  $('#drawer').querySelectorAll('[data-chkclar]').forEach(b=>b.addEventListener('click',()=>{const c=CHECKS.find(x=>x.key===b.dataset.chkclar);s.clarifications.push({id:clarSeq++,type:'Question',field:c?c.nm:'',msg:'Our '+(c?c.nm.toLowerCase():'check')+' raised a query. Please confirm or provide supporting detail.',status:'open',at:todayStr()});dtab='clarify';toast('Clarification raised');openDrawer(id);render();}));
  // clarifications: raise + resolve
  const cs=$('#clarsend');if(cs)cs.addEventListener('click',()=>{const ty=$('#clartype').value,fl=$('#clarfield').value.trim(),msg=$('#clarmsg').value.trim();if(!msg){toast('Add a message');return;}s.clarifications.push({id:clarSeq++,type:ty,field:fl,msg,status:'open',at:todayStr()});toast('Sent to supplier');openDrawer(id);render();});
  $('#drawer').querySelectorAll('[data-clarresolve]').forEach(b=>b.addEventListener('click',()=>{const c=s.clarifications.find(x=>x.id==b.dataset.clarresolve);if(c)c.status='resolved';toast('Clarification resolved');openDrawer(id);render();}));
  $('#scrim').classList.add('on');$('#drawer').classList.add('on');
}
function closeDrawer(){$('#scrim').classList.remove('on');$('#drawer').classList.remove('on');openId=null;}
$('#scrim').addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
document.querySelectorAll('.vbtn').forEach(b=>b.addEventListener('click',()=>{view=b.dataset.view;closeDrawer();render();}));
render();
</script>
</body>
</html>
