name: Refresh data snapshot

# Re-ingests free demand + trade-flow sources, recomputes scores/triggers, and
# commits the updated dashboard snapshot (which triggers a Vercel redeploy).
# If the RSI_DATABASE_URL secret is set, the same run also writes to Supabase.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Optional secrets — unset => SQLite + Comtrade preview endpoint + the
      # deterministic insight narrative (no LLM).
      RSI_DATABASE_URL: ${{ secrets.RSI_DATABASE_URL }}
      RSI_COMTRADE_API_KEY: ${{ secrets.RSI_COMTRADE_API_KEY }}
      RSI_ANTHROPIC_API_KEY: ${{ secrets.RSI_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: pipelines
        run: uv sync --extra postgres --extra llm

      - name: Run pipeline (free sources -> insights -> publish)
        working-directory: pipelines
        # `db init` is idempotent (create_all) and ensures the schema — incl.
        # source_status — exists on the target store. `export` publishes the
        # snapshot row to Supabase when RSI_DATABASE_URL is set.
        #
        # Trade-flows + Wikipedia pageviews are reliable from CI. The free
        # Google-Trends connector is intentionally NOT run here: Google rate-
        # limits GitHub's datacenter IPs hard, so it stalls on backoff and
        # returns little. For Google Trends + social/marketplace feeds, set
        # RSI_APIFY_TOKEN and add the opt-in connectors (e.g. `rsi ingest
        # tiktok amazon`), which use Apify actors instead.
        run: |
          uv run rsi db init
          uv run rsi ingest wikipedia comtrade --days 60
          uv run rsi score
          uv run rsi correlate
          uv run rsi insights
          uv run rsi export

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- web/lib/snapshot.json; then
            echo "Snapshot unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/lib/snapshot.json
            git commit -m "chore(data): scheduled snapshot refresh"
            git push
          fi
