name: Refresh data snapshot

# Re-ingests demand + trade-flow sources, recomputes scores/triggers, and
# commits the updated dashboard snapshot (which triggers a Vercel redeploy).
# If the RSI_DATABASE_URL secret is set, the same run also writes to Supabase.
#
# The weekly cron refreshes only the fast/free demand source (Wikipedia) and
# recomputes against existing trade flows. The paid Apify social/marketplace
# feeds are OPT-IN per run: trigger manually via "Run workflow" with the
# `apify` box checked (consumes Apify credits; ~1-2h, one actor run/category
# across 5 connectors). They never run on the schedule.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      apify:
        description: "Also ingest paid Apify feeds (TikTok/Instagram/Pinterest/Amazon/AliExpress) — consumes credits"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Optional secrets — unset => SQLite + Comtrade preview endpoint + the
      # deterministic insight narrative (no LLM) + Apify connectors no-op.
      RSI_DATABASE_URL: ${{ secrets.RSI_DATABASE_URL }}
      RSI_COMTRADE_API_KEY: ${{ secrets.RSI_COMTRADE_API_KEY }}
      RSI_ANTHROPIC_API_KEY: ${{ secrets.RSI_ANTHROPIC_API_KEY }}
      RSI_APIFY_TOKEN: ${{ secrets.RSI_APIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: pipelines
        run: uv sync --extra postgres --extra llm

      - name: Run pipeline (refresh demand -> recompute -> publish)
        working-directory: pipelines
        # `db init` is idempotent (create_all) and ensures the schema — incl.
        # source_status — exists on the target store. `export` publishes the
        # snapshot row to Supabase when RSI_DATABASE_URL is set.
        #
        # Wikipedia (fast/free) runs every time. The Apify social/marketplace
        # connectors run only when manually dispatched with `apify=true` (paid,
        # slow). comtrade is annual + slow on the free endpoint, so it is
        # refreshed separately/occasionally: `rsi ingest comtrade` (fast with
        # RSI_COMTRADE_API_KEY); existing flows persist between runs.
        run: |
          uv run rsi db init
          uv run rsi ingest wikipedia --days 60
          if [ "${{ inputs.apify }}" = "true" ]; then
            echo "::notice::Apify feeds requested — ingesting paid social/marketplace connectors"
            uv run rsi ingest tiktok instagram pinterest amazon aliexpress --days 60
          fi
          uv run rsi score
          uv run rsi correlate
          uv run rsi insights
          uv run rsi export

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- web/lib/snapshot.json; then
            echo "Snapshot unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/lib/snapshot.json
            git commit -m "chore(data): snapshot refresh"
            git push
          fi
