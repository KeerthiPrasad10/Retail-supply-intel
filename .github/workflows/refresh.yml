name: Refresh data snapshot

# Re-ingests demand + trade-flow sources, recomputes scores/triggers, and
# commits the updated dashboard snapshot (which triggers a Vercel redeploy).
# If the RSI_DATABASE_URL secret is set, the same run also writes to Supabase.
#
# The weekly cron recomputes against existing demand series and trade flows. The paid Apify social/marketplace
# feeds are OPT-IN per run: trigger manually via "Run workflow" with the
# `apify` box checked (consumes Apify credits; ~1-2h, one actor run/category
# across 5 connectors). They never run on the schedule.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      apify:
        description: "Also ingest paid Apify feeds (TikTok/Instagram/Pinterest/Amazon/AliExpress) — consumes credits"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Optional secrets — unset => SQLite + Comtrade preview endpoint + the
      # deterministic insight narrative (no LLM) + Apify connectors no-op.
      RSI_DATABASE_URL: ${{ secrets.RSI_DATABASE_URL }}
      RSI_COMTRADE_API_KEY: ${{ secrets.RSI_COMTRADE_API_KEY }}
      RSI_ANTHROPIC_API_KEY: ${{ secrets.RSI_ANTHROPIC_API_KEY }}
      RSI_APIFY_TOKEN: ${{ secrets.RSI_APIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: pipelines
        run: uv sync --extra postgres --extra llm

      - name: Run pipeline (refresh demand -> recompute -> publish)
        working-directory: pipelines
        # `db init` is idempotent (create_all) and ensures the schema exists.
        # `export` publishes the snapshot row to Supabase when RSI_DATABASE_URL
        # is set.
        #
        # Demand comes from search + social (consumer-demand signals). The
        # social feeds are paid (Apify), so they run only on manual dispatch
        # with `apify=true`.
        # A plain run (the weekly cron) just recomputes scores/triggers against
        # the data already in the store and republishes — no ingest, no spend.
        run: |
          uv run rsi db init
          if [ "${{ inputs.apify }}" = "true" ]; then
            echo "::notice::Apify feeds requested — ingesting paid demand connectors"
            uv run rsi ingest google_trends tiktok instagram pinterest amazon aliexpress --days 60
          fi
          uv run rsi score
          uv run rsi correlate
          uv run rsi insights
          uv run rsi export

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- web/lib/snapshot.json; then
            echo "Snapshot unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/lib/snapshot.json
            git commit -m "chore(data): snapshot refresh"
            # `main` can advance during the (long) run, so rebase the snapshot
            # commit onto the latest main before pushing — otherwise the push
            # fails non-fast-forward and the committed copy goes stale.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "push attempt $attempt failed; retrying after rebase…"
              git rebase --abort 2>/dev/null || true
              sleep 3
            done
          fi
